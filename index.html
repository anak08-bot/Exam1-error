<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="main-nav">
            <ul>
                <li class="home-btn" ><a href="#" class="nav-link"><img src="./assets/Icons/home.png" alt="Home">Home</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/discover.png" alt="Discover">Discover</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/search.png" alt="Search"></a><input type="search" placeholder="search" ></li>
            </ul>
        </nav>
        <div class="action-icons">
            <a href=""><img src="./assets/Icons/1bell.png" alt="bell"></a>
            <a href=""><img src="./assets/Icons/2lock.png" alt="lock"></a>
            <a href=""><img src="./assets/Icons/3friends.png" alt="friends"></a>
            <a href=""><img src="./assets/Icons/4settings.png" alt="settings"></a>
            <a href=""><img src="./assets/Icons/5theme.png" alt="theme"></a>
        </div>
    </header>
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <ul>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/my-library.png" alt="library">My Library</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/pin.png" alt="pins">Pins</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/playlist.png" alt="playlists">Playlists</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/liked-songs.png" alt="liked-songs">Liked songs</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/saves.png" alt="saves">Saves</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/albums.png" alt="albums">Albums</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/folders.png" alt="folders">Folders</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/podcasts.png" alt="podcasts">Podcasts</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/audiobooks.png" alt="audiobooks">Audiobooks</a></li>
                <li><a href="#" class="nav-link"><img src="./assets/Icons/artists.png" alt="artists">Artists</a></li>
            </ul>
        </nav>
    </aside>
    <main>
        <div class="filters">
            <button class="chip">All</button>
            <button class="chip">Music</button>
            <button class="chip">Podcasts</button>
            <button class="chip">Audiobooks</button>
        </div>

        <section class="made-for-you">
            <h2>Made For You</h2>
        </section>
    </main>

    <footer>
        <div class="player-left"></div>
        <div class="player-center"></div>
        <div class="player-right"></div>
    </footer>
</body>
</html>
